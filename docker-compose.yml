services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URI=postgresql://tikivillage:${POSTGRES_PASSWORD}@db:5432/tikivillage
      - PAYLOAD_SECRET=${PAYLOAD_SECRET}
      - PAYLOAD_PUBLIC_SERVER_URL=${PAYLOAD_PUBLIC_SERVER_URL:-http://localhost:3000}
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
      - PAYLOAD_API_URL=${PAYLOAD_API_URL:-http://localhost:3000/api}
      - PAYZEN_SHOP_ID=${PAYZEN_SHOP_ID}
      - PAYZEN_MODE=${PAYZEN_MODE:-TEST}
      - PAYZEN_TEST_KEY=${PAYZEN_TEST_KEY}
      - PAYZEN_PROD_KEY=${PAYZEN_PROD_KEY}
      - PAYZEN_HMAC_TEST_KEY=${PAYZEN_HMAC_TEST_KEY}
      - PAYZEN_HMAC_PROD_KEY=${PAYZEN_HMAC_PROD_KEY}
      - PAYZEN_PUBLIC_TEST_KEY=${PAYZEN_PUBLIC_TEST_KEY}
      - PAYZEN_PUBLIC_PROD_KEY=${PAYZEN_PUBLIC_PROD_KEY}
    volumes:
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=tikivillage
      - POSTGRES_USER=tikivillage
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tikivillage"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  media_data:
