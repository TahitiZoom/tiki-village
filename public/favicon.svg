<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B4513"/>
      <stop offset="100%" style="stop-color:#5C2D06"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="url(#bg)" stroke="#D4A017" stroke-width="3"/>
  <!-- Tiki eyes -->
  <ellipse cx="22" cy="24" rx="6" ry="5" fill="#F5DEB3"/>
  <ellipse cx="42" cy="24" rx="6" ry="5" fill="#F5DEB3"/>
  <circle cx="22" cy="24" r="3" fill="#2F1B0E"/>
  <circle cx="42" cy="24" r="3" fill="#2F1B0E"/>
  <!-- Tiki nose -->
  <rect x="29" y="22" width="6" height="10" rx="2" fill="#D4A017"/>
  <!-- Tiki mouth -->
  <rect x="20" y="36" width="24" height="6" rx="2" fill="#F5DEB3"/>
  <line x1="26" y1="36" x2="26" y2="42" stroke="#8B4513" stroke-width="1.5"/>
  <line x1="32" y1="36" x2="32" y2="42" stroke="#8B4513" stroke-width="1.5"/>
  <line x1="38" y1="36" x2="38" y2="42" stroke="#8B4513" stroke-width="1.5"/>
  <!-- TIKI text -->
  <text x="32" y="56" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="10" font-weight="bold" fill="#D4A017" letter-spacing="1">TIKI</text>
</svg>
